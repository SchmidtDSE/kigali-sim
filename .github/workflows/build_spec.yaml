name: Build Specification PDF
on:
  push:
    branches:
      - main
      - deploy
    paths:
      - 'docs/spec/**'
      - '.github/workflows/build_spec.yaml'

permissions:
  contents: read

jobs:
  buildSpecPDF:
    environment: build
    runs-on: ubuntu-latest
    name: Build QubecTalk Specification PDF
    steps:
      - name: Checkout
        run: |
          git clone https://github.com/SchmidtDSE/kigali-sim.git .
          git checkout ${{ github.sha }}

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-latex-base texlive-latex-extra texlive-fonts-recommended

      - name: Build PDF from Markdown
        run: |
          pandoc docs/spec/qubectalk.md \
            -o docs/spec/qubectalk.pdf \
            --pdf-engine=pdflatex \
            --from=markdown \
            --template=eisvogel \
            --listings \
            --number-sections \
            --toc \
            --metadata title="QubecTalk Domain Specific Language" \
            --metadata author="A Samuel Pottinger" \
            --metadata date="2025-10-29" \
            || pandoc docs/spec/qubectalk.md \
            -o docs/spec/qubectalk.pdf \
            --pdf-engine=pdflatex \
            --from=markdown \
            --number-sections \
            --toc

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Upload spec PDF to SFTP
        env:
          SSHPASS: ${{ secrets.BUILDSFTPPASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no \
            ${{ secrets.BUILDSFTPUSER }}@${{ secrets.BUILDSFTPHOST }} \
            "mkdir -p ./build.kigalisim.org/artifacts/${{ github.sha }}/qubectalk-spec-pdf"
          sshpass -e scp -o StrictHostKeyChecking=no \
            docs/spec/qubectalk.pdf \
            ${{ secrets.BUILDSFTPUSER }}@${{ secrets.BUILDSFTPHOST }}:./build.kigalisim.org/artifacts/${{ github.sha }}/qubectalk-spec-pdf/qubectalk.pdf

  deploySpecPDF:
    environment: deploy
    if: github.ref == 'refs/heads/deploy'
    runs-on: ubuntu-latest
    name: Deploy Specification PDF
    needs: [buildSpecPDF]
    steps:
      - name: Install SSH client and sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-client sshpass

      - name: Setup SSH known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H -p 22 ${{ secrets.SFTPHOST }} >> ~/.ssh/known_hosts

      - name: Download spec PDF
        run: |
          mkdir -p ./pdf
          curl -o ./pdf/qubectalk.pdf \
            https://build.kigalisim.org/artifacts/${{ github.sha }}/qubectalk-spec-pdf/qubectalk.pdf

      - name: Upload PDF via SCP with password
        env:
          SSHPASS: ${{ secrets.SFTPPASSWORD }}
        run: |
          sshpass -e scp -P 22 -o StrictHostKeyChecking=no \
            ./pdf/qubectalk.pdf \
            ${{ secrets.SFTPUSER }}@${{ secrets.SFTPHOST }}:./kigalisim.org/guide/qubectalk.pdf
